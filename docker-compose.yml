services:
  postgres:
    image: postgres:16

    container_name: workoutflow_postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workoutflow

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: workoutflow_backend

    restart: always

    ports:
      - "3001:3000"

    env_file:
      - ./backend/.env

    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend

    container_name: workoutflow_frontend

    restart: always

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  postgres_data: